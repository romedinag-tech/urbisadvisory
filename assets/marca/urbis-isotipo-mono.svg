<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Urbis Advisory">
  <title>Urbis Advisory</title>
  <!-- Un solo color (navy). Para fax, sellos, documentos en blanco y negro y grabados.
       Cambiar los fill/stroke a currentColor si se quiere heredar el color del contexto. -->
  <defs>
    <clipPath id="urbis-m"><rect x="10" y="10" width="80" height="80" rx="20"/></clipPath>
  </defs>
  <rect x="10" y="10" width="80" height="80" rx="20" fill="none" stroke="#0F2A47" stroke-width="5"/>
  <g clip-path="url(#urbis-m)">
    <g stroke="#0F2A47" stroke-width="2.4" opacity="0.35">
      <line x1="10" y1="38" x2="90" y2="38"/>
      <line x1="10" y1="64" x2="90" y2="64"/>
      <line x1="38" y1="10" x2="38" y2="90"/>
      <line x1="64" y1="10" x2="64" y2="90"/>
    </g>
    <path d="M18 80 L82 26" fill="none" stroke="#0F2A47" stroke-width="6.5" stroke-linecap="round"/>
  </g>
  <circle cx="50" cy="53" r="8" fill="#0F2A47"/>
</svg>
