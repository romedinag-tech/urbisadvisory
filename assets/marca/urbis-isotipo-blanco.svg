<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Urbis Advisory">
  <title>Urbis Advisory</title>
  <!-- Dirección A · versión para fondos oscuros (tinta #0A1A2E).
       El cuadrado va un punto más claro que el navy puro para no perderse contra la tinta. -->
  <defs>
    <clipPath id="urbis-r"><rect x="10" y="10" width="80" height="80" rx="20"/></clipPath>
  </defs>
  <rect x="10" y="10" width="80" height="80" rx="20" fill="#16324F"/>
  <g clip-path="url(#urbis-r)">
    <g stroke="#8FBF8B" stroke-width="2.4" opacity="0.45">
      <line x1="10" y1="38" x2="90" y2="38"/>
      <line x1="10" y1="64" x2="90" y2="64"/>
      <line x1="38" y1="10" x2="38" y2="90"/>
      <line x1="64" y1="10" x2="64" y2="90"/>
    </g>
    <path d="M16 82 L84 24" fill="none" stroke="#8FBF8B" stroke-width="6.5" stroke-linecap="round"/>
  </g>
  <circle cx="50" cy="53" r="8" fill="#D98E3D"/>
</svg>
