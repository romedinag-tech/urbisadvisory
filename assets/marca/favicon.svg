<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Urbis Advisory">
  <title>Urbis Advisory</title>
  <!-- Isotipo optimizado para tamaños chicos: misma trama urbana del isotipo grande,
       con las líneas engrosadas para que no se emborronen. Ver favicon-16.png para
       la variante aún más aligerada que se usa a 16 px. -->
  <rect width="100" height="100" rx="22" fill="#0F2A47"/>
  <g stroke="#8FBF8B" stroke-width="5" opacity="0.28">
    <line x1="0" y1="34" x2="100" y2="34"/><line x1="0" y1="70" x2="100" y2="70"/>
    <line x1="34" y1="0" x2="34" y2="100"/><line x1="70" y1="0" x2="70" y2="100"/>
  </g>
  <path d="M12 86 L88 20" fill="none" stroke="#8FBF8B" stroke-width="9" stroke-linecap="round"/>
  <circle cx="50" cy="53" r="11" fill="#D98E3D"/>
</svg>
